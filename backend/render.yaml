services:
  - type: web
    name: agrosmart-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn Agrosmartproject.wsgi --config gunicorn.conf.py
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: agrosmart-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: agrosmart-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: agrosmart-redis
          type: redis
          property: connectionString
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://hackathon-project.onrender.com
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: true
      - key: DEFAULT_FROM_EMAIL
        value: AgroSmart <your-gmail-address@gmail.com>
      - key: CORS_ALLOWED_ORIGINS
        value: https://hackathon-project.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://hackathon-project.onrender.com

  - type: redis
    name: agrosmart-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: agrosmart-db
    databaseName: agrosmart
    user: agrosmart
    plan: free
