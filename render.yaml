services:
  - type: web
    name: agrosmart-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn Agrosmartproject.wsgi --config gunicorn.conf.py
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: agrosmart-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: agrosmart-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: agrosmart-redis
          type: redis
          property: connectionString
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://hackathon-project.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://hackathon-project.onrender.com

  - type: web
    name: hackathon-project
    env: static
    rootDir: hackathon-project
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://agrosmart-backend.onrender.com/api
      - key: VITE_ALLOW_HTTP_IN_PROD
        value: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: redis
    name: agrosmart-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: agrosmart-db
    databaseName: agrosmart
    user: agrosmart
    plan: free
